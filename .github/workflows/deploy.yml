name: Deploy LaTeX Site
on: [push]

# Grant permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex  # Change this if your file isn't main.tex

      - name: Create Web Redirect
        # This creates a small HTML file that tells browsers to open your PDF immediately
        run: echo '<meta http-equiv="refresh" content="0; url=main.pdf">' > index.html

      - name: Upload Website Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
