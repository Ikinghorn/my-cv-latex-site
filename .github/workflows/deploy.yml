name: Deploy LaTeX Site
on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex  # Ensure this matches your filename!
          # Using 'latexmk' is standard and reliable
          args: "-pdf -interaction=nonstopmode"

      - name: Create Web Redirect
        run: echo '<meta http-equiv="refresh" content="0; url=main.pdf">' > index.html

      - name: Upload Website Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
